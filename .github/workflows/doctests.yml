name: doctests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  doctests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run doctests
        run: |
          python -m doctest -v chat.py
          python -m doctest -v tools/ls.py
          python -m doctest -v tools/cat.py
          python -m doctest -v tools/grep.py
          python -m doctest -v tools/calculate.py
          python -m doctest -v tools/compact.py